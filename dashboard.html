<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Dashboard</title>
    <link rel="stylesheet" href="style.css"> </head>
<body class="dashboard-body">

    <div class="sidebar">
        <h2 style="color: white; text-align: center; padding: 20px;">📚 लाइब्रेरी</h2>
        <button class="sub-btn" onclick="showSubject('biology')">🧬 जीव विज्ञान (Bio)</button>
        <button class="sub-btn" onclick="showSubject('physics')">⚡ भौतिक विज्ञान (Phy)</button>
        <button class="sub-btn" onclick="showSubject('chemistry')">🧪 रसायन विज्ञान (Chem)</button>
        <button class="sub-btn" onclick="showSubject('maths')">📐 गणित (Maths)</button>
        <button class="sub-btn" onclick="showSubject('gk')">🌍 सामान्य ज्ञान (GK)</button>
        <button class="sub-btn" onclick="showSubject('ncert_questions')">❓ NCERT प्रश्न-उत्तर</button>
    </div>

    <div class="main-content">
        <div id="welcome-screen">
            <h1>नमस्ते, <span id="studentName">विद्यार्थी</span>!</h1>
            <p>पढ़ाई शुरू करने के लिए बाईं ओर से विषय चुनें।</p>
        </div>

        <div id="subject-view" class="hidden">
            <h2 id="subject-title"></h2>
            <div id="chapter-buttons"></div>
        </div>

        <div id="reader-view" class="hidden">
            <button class="back-btn" onclick="backToChapters()">← वापस जाएँ</button>
            <div class="book-container">
                <iframe id="book-reader" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        // Student name set karne ke liye
        document.getElementById('studentName').innerText = localStorage.getItem('studentName') || "विद्यार्थी";

        const books = {
            biology: {
                name: "जीव विज्ञान (Biology)",
                links: [
                    { name: "📖 कक्षा 11: सम्पूर्ण पुस्तक", url: "https://ncert.nic.in/textbook.php?khbo1=0-22" },
                    { name: "📖 कक्षा 12: सम्पूर्ण पुस्तक", url: "https://ncert.nic.in/textbook.php?khbo2=0-16" }
                ]
            },
            physics: {
                name: "भौतिक विज्ञान (Physics)",
                links: [
                    { name: "📖 कक्षा 11: सम्पूर्ण पुस्तक", url: "https://ncert.nic.in/textbook.php?khph1=0-8" },
                    { name: "📖 कक्षा 12: सम्पूर्ण पुस्तक", url: "https://ncert.nic.in/textbook.php?khph2=0-14" }
                ]
            },
            chemistry: {
                name: "रसायन विज्ञान (Chemistry)",
                links: [
                    { name: "📖 कक्षा 11: सम्पूर्ण पुस्तक", url: "https://ncert.nic.in/textbook.php?khch1=0-9" },
                    { name: "📖 कक्षा 12: सम्पूर्ण पुस्तक", url: "https://ncert.nic.in/textbook.php?khch2=0-9" }
                ]
            },
            maths: {
                name: "गणित (Maths)",
                links: [
                    { name: "📖 कक्षा 11: सम्पूर्ण गणित", url: "https://ncert.nic.in/textbook.php?khmh1=0-16" },
                    { name: "📖 कक्षा 12: सम्पूर्ण गणित", url: "https://ncert.nic.in/textbook.php?khmh2=0-13" }
                ]
            },
            gk: {
                name: "सामान्य ज्ञान (GK)",
                links: [
                    { name: "📜 इतिहास (History)", url: "https://ncert.nic.in/textbook.php?khhs1=0-11" },
                    { name: "🗺️ भूगोल (Geography)", url: "https://ncert.nic.in/textbook.php?khgy1=0-7" }
                ]
            },
            ncert_questions: {
                name: "NCERT प्रश्न-उत्तर (हिंदी माध्यम)",
                links: [
                    { name: "❓ कक्षा 11 & 12 (भौतिकी)", url: "https://ncert.nic.in/exemplar-problems.php?ln=hi" },
                    { name: "❓ कक्षा 11 & 12 (रसायन)", url: "https://ncert.nic.in/exemplar-problems.php?ln=hi" },
                    { name: "❓ कक्षा 11 & 12 (जीव विज्ञान)", url: "https://ncert.nic.in/exemplar-problems.php?ln=hi" }
                ]
            }
        };

        function showSubject(key) {
            // Screens control karne ke liye
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('reader-view').classList.add('hidden');
            document.getElementById('subject-view').classList.remove('hidden');

            const sub = books[key];
            document.getElementById('subject-title').innerText = sub.name;
            
            const container = document.getElementById('chapter-buttons');
            container.innerHTML = ""; // Purana content saaf karne ke liye

            sub.links.forEach(link => {
                const btn = document.createElement('button');
                btn.className = "sub-btn"; // Wahi class jo sidebar mein hai
                btn.style.width = "100%";
                btn.style.marginBottom = "10px";
                btn.innerText = link.name;
                btn.onclick = () => openBook(link.url);
                container.appendChild(btn);
            });
        }

        function openBook(url) {
            if(url.includes('exemplar') || url.includes('textbook.php')) {
                // NCERT ki site direct open hogi naye tab mein
                window.open(url, '_blank');
            } else {
                // PDF hai toh reader mein dikhao
                document.getElementById('subject-view').classList.add('hidden');
                document.getElementById('reader-view').classList.remove('hidden');
                document.getElementById('book-reader').src = url;
            }
        }

        function backToChapters() {
            document.getElementById('reader-view').classList.add('hidden');
            document.getElementById('subject-view').classList.remove('hidden');
            document.getElementById('book-reader').src = "";
        }
    </script>

    <style>
        /* Agar buttons nahi dikh rahe toh ye chota sa style help karega */
        .hidden { display: none; }
        .sub-btn { cursor: pointer; padding: 10px; margin: 5px; border-radius: 5px; border: none; background: #334155; color: white; transition: 0.3s; }
        .sub-btn:hover { background: #475569; }
        #chapter-buttons { display: flex; flex-direction: column; max-width: 400px; margin-top: 20px; }
    </style>
</body>
</html>
